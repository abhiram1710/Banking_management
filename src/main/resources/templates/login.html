<!DOCTYPE html>
<html>
<head>
<title>MyBank Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  background: linear-gradient(to right, #667eea, #764ba2);
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>MyBank Login</h2>

<!-- ❌ NO form tag (important) -->
<input id="username" type="text" placeholder="Enter username">
<input id="password" type="password" placeholder="Enter password">

<!-- ✅ type="button" VERY IMPORTANT -->
<button type="button" onclick="loginUser()">Login Now</button>

</div>

<script>

// ✅ YOUR BACKEND URL
const BASE_URL = "https://banking-management-56wi.onrender.com";

function loginUser() {

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  fetch(`${BASE_URL}/api/auth/login`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: username,
      password: password
    })
  })
  .then(response => response.text())
  .then(result => {

    console.log("Response:", result);

    if(result === "Login Success") {
      localStorage.setItem("username", username);

      // ✅ redirect to frontend dashboard
      window.location.href = "dashboard.html";
    } else {
      alert("Invalid Credentials");
    }

  })
  .catch(error => {
    console.error(error);
    alert("Backend not reachable");
  });
}

</script>

</body>
</html>
